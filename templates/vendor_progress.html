<!DOCTYPE html>
<html>

<head>

<title>Vendor Daily Progress</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#eef2f7;
padding:30px;
}

.topbar{

background:#0b566f;
height:80px;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 35px;

border-radius:18px;

color:white;

margin-bottom:30px;

}

.logo{

font-size:30px;
font-weight:bold;

}

.back{

background:white;
color:#0b566f;

padding:12px 25px;

border-radius:10px;

text-decoration:none;

font-weight:bold;

}

.hero{

background:
linear-gradient(
90deg,
#0d4d6c,
green
);

padding:50px;

border-radius:30px;

color:white;

margin-bottom:35px;

}

.hero h1{

font-size:45px;
margin-bottom:15px;

}

.hero p{

font-size:22px;
opacity:.9;

}

.box{

background:white;

padding:35px;

border-radius:25px;

box-shadow:
0 2px 18px rgba(0,0,0,.1);

}

.box h1{

color:#0b566f;

margin-bottom:30px;

}

.uploadarea{

padding:50px;

border:2px dashed #0b566f;

border-radius:20px;

text-align:center;

background:#f7fbff;

margin-bottom:30px;

}

input[type=file]{

font-size:17px;

}

button{

background:#0b566f;

color:white;

padding:15px 35px;

border:none;

border-radius:12px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#08384a;

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">

Vendor Progress Dashboard

</div>

<a
href="/vendor_dashboard"
class="back">

Back

</a>

</div>



<div class="hero">

<h1>

Daily Progress File Upload

</h1>

<p>

Upload Excel, CSV or PDF progress reports for project tracking

</p>

</div>



<div class="box">

<h1>

Upload Progress File

</h1>

<form

action="/upload_progress"

method="POST"

enctype="multipart/form-data"

>

<div class="uploadarea">

<input
type="file"
name="progress_file"
multiple
required
>

>

>

</div>


<button
type="submit">

Upload File

</button>

</form>

</div>

</body>
</html>
