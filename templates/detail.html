<!DOCTYPE html>
<html>

<head>

<title>Detailed Engineering Analysis</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:40px;
margin:0;
}

.container{
width:90%;
margin:auto;
}

.card{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0px 4px 20px rgba(0,0,0,.15);
}

.title{

font-size:42px;
font-weight:bold;
color:#114b5f;
margin-bottom:30px;

}

.issue{

background:#eef7ff;
border-left:6px solid #0a58ca;
padding:20px;
border-radius:12px;
margin-bottom:30px;
font-size:22px;

}

.analysis{

line-height:2;
font-size:18px;
white-space:pre-wrap;
color:#333;

}

.back{

display:inline-block;
margin-top:30px;
padding:15px 28px;
background:#114b5f;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">

AI Detailed Engineering Review

</div>

<div class="issue">

<b>Issue Identified:</b>

{{issue}}

</div>

<div class="analysis">

{{analysis}}

</div>

<a href="/" class="back">

← Return Dashboard

</a>

</div>

</div>

</body>

</html>
